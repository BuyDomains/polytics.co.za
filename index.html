<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parked Domain</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f5f7;
    color:#444;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.container{
    text-align:center;
    padding:60px 80px;
    background:#ffffff;
    border:1px solid #e3e6ea;
    border-radius:12px;
    box-shadow:0 15px 40px rgba(0,0,0,.06);
    max-width:600px;
    width:90%;
}

.icon{
    font-size:42px;
    margin-bottom:25px;
    color:#777;
}

h1{
    font-size:2rem;
    font-weight:300;
    letter-spacing:1px;
    color:#222;
    margin-bottom:18px;
}

p{
    font-size:1rem;
    color:#777;
    line-height:1.7;
}
</style>

</head>
<body>

<div class="container">
    <div class="icon">●</div>
    <h1>This domain is parked for future use.</h1>
    <p>Please check back at a later date.</p>
</div>

</body>
</html>
